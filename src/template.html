<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gstack — Visual Skill Explorer</title>
  <meta name="description" content="Interactive visual documentation for gstack by Garry Tan. Explore {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">

  <!-- Open Graph / X -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="gstack — Visual Skill Explorer">
  <meta property="og:description" content="Interactive visual map of {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">
  <meta property="og:image" content="assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="gstack — Visual Skill Explorer">
  <meta name="twitter:description" content="Interactive visual map of {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
{{INLINE_CSS}}
  </style>
</head>
<body>
  <!-- Grain overlay -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo">gstack</a>
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search skills..." aria-label="Search skills">
        <div class="search-results" hidden></div>
      </div>
      <nav class="header-nav">
        <button class="view-toggle" data-view="graph" aria-label="Toggle view">
          <span class="view-toggle-label">Graph</span>
        </button>
        <a href="https://github.com/garrytan/gstack" target="_blank" rel="noopener" class="github-link" aria-label="View gstack on GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <canvas class="particle-canvas" aria-hidden="true"></canvas>
    <div class="hero-content">
      <h1 class="hero-title">gstack<span class="cursor">_</span></h1>
      <p class="hero-subtitle">A CLI tool that turns Claude Code into a virtual engineering team</p>
      <div class="hero-meta">
        <span class="version-badge">v{{VERSION}}</span>
        <span class="skill-count">{{TOTAL_SKILLS}} skills</span>
        <span class="hero-sep">&middot;</span>
        <span class="hero-author">by Garry Tan</span>
      </div>
    </div>
  </section>

  <!-- Workflow Pipeline -->
  <section class="workflow-section" id="workflow">
    <h2 class="section-title">Workflow Pipeline</h2>
    <p class="section-desc">Click a stage to filter skills in the graph below</p>
    <div class="workflow-container">
      <div class="workflow-track"></div>
    </div>
  </section>

  <!-- Skill Graph -->
  <section class="graph-section" id="graph">
    <div class="graph-controls">
      <div class="category-filters"></div>
      <button class="view-toggle-btn" data-current="graph">
        <span class="toggle-graph">Graph</span>
        <span class="toggle-cards">Cards</span>
      </button>
    </div>
    <div class="graph-container">
      <svg class="skill-graph"></svg>
    </div>
    <div class="cards-container" hidden>
      <div class="cards-grid"></div>
    </div>
  </section>

  <!-- Detail Panel -->
  <div class="detail-overlay" hidden></div>
  <aside class="detail-panel" hidden>
    <div class="detail-header">
      <div class="detail-title-row">
        <h2 class="detail-name"></h2>
        <button class="detail-close" aria-label="Close">&times;</button>
      </div>
      <div class="detail-meta"></div>
    </div>
    <div class="detail-body"></div>
    <div class="detail-footer">
      <button class="detail-raw-toggle">Show raw markdown</button>
    </div>
  </aside>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>Built from <a href="https://github.com/garrytan/gstack" target="_blank" rel="noopener">garrytan/gstack</a> v{{VERSION}}</p>
      <p class="footer-updated">Last updated: <time>{{BUILD_DATE}}</time></p>
    </div>
  </footer>

  <script>
    window.__SKILLS_DATA__ = {{SKILLS_DATA}};
    window.__GRAPH_DATA__ = {{GRAPH_DATA}};
  </script>
  <script>
{{INLINE_JS}}
  </script>
</body>
</html>
