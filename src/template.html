<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gstack — Visual Skill Explorer</title>
  <meta name="description" content="Interactive visual documentation for gstack by Garry Tan. Explore {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="gstack — Visual Skill Explorer">
  <meta property="og:description" content="Interactive visual map of {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">
  <meta property="og:image" content="assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="gstack — Visual Skill Explorer">
  <meta name="twitter:description" content="Interactive visual map of {{TOTAL_SKILLS}} skills that turn Claude Code into a virtual engineering team.">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">

  <style>
{{INLINE_CSS}}
  </style>
</head>
<body data-view="story">
  <div class="grain-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="#story" class="logo">gstack</a>
      <nav class="tab-nav" role="tablist">
        <button class="tab" data-view="story" role="tab" aria-selected="true">
          <span class="tab-label">Story</span>
          <span class="tab-desc">The walkthrough</span>
        </button>
        <button class="tab" data-view="flow" role="tab" aria-selected="false">
          <span class="tab-label">Flow</span>
          <span class="tab-desc">The workflow</span>
        </button>
        <button class="tab" data-view="atlas" role="tab" aria-selected="false">
          <span class="tab-label">Atlas</span>
          <span class="tab-desc">The reference</span>
        </button>
      </nav>
      <div class="header-actions">
        <button class="search-trigger" aria-label="Search (⌘K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <span class="search-trigger-label">Search</span>
          <kbd>⌘K</kbd>
        </button>
        <a href="https://github.com/garrytan/gstack" target="_blank" rel="noopener" class="github-link" aria-label="View gstack on GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Search overlay -->
  <div class="search-overlay" hidden>
    <div class="search-overlay-inner">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" class="search-overlay-input" placeholder="Search skills, triggers, tools..." autofocus>
        <kbd class="search-esc">ESC</kbd>
      </div>
      <div class="search-overlay-results"></div>
    </div>
  </div>

  <main>
    <!-- STORY VIEW -->
    <section class="view view-story" data-view="story">
      <!-- Story content rendered by story.js from inline data -->
    </section>

    <!-- FLOW VIEW -->
    <section class="view view-flow" data-view="flow" hidden>
      <div class="flow-container">
        <div class="flow-intro">
          <h1 class="view-title">The Flow</h1>
          <p class="view-desc">9 stages from idea to insight. Click a station to see the skills available there.</p>
        </div>
        <div class="flow-pipeline" role="tablist" aria-label="Workflow stages"></div>
        <div class="flow-stage-detail" role="tabpanel"></div>
        <div class="flow-cross-cutting">
          <h2 class="section-title-sm">Always Available</h2>
          <p class="section-desc-sm">Cross-cutting skills that aren't tied to a single stage</p>
          <div class="flow-cross-rail"></div>
        </div>
      </div>
    </section>

    <!-- ATLAS VIEW -->
    <section class="view view-atlas" data-view="atlas" hidden>
      <div class="atlas-container">
        <aside class="atlas-sidebar">
          <div class="atlas-sidebar-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" class="atlas-filter-input" placeholder="Filter skills...">
          </div>
          <nav class="atlas-nav"></nav>
        </aside>
        <article class="atlas-content"></article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Built from <a href="https://github.com/garrytan/gstack" target="_blank" rel="noopener">garrytan/gstack</a> v{{VERSION}} · {{TOTAL_SKILLS}} skills</p>
      <p class="footer-updated">Last updated: <time>{{BUILD_DATE}}</time></p>
    </div>
  </footer>

  <script>
    window.__SKILLS_DATA__ = {{SKILLS_DATA}};
    window.__GRAPH_DATA__ = {{GRAPH_DATA}};
  </script>
  <script>
{{INLINE_JS}}
  </script>
</body>
</html>
