name: Update and Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check upstream for changes
        id: check
        run: |
          # Clone with full history so backfill can walk git log (first time only)
          if [ -d versions ] && [ -f versions/index.json ]; then
            DEPTH_FLAG="--depth 1"
          else
            DEPTH_FLAG=""
          fi
          git clone $DEPTH_FLAG https://github.com/garrytan/gstack.git upstream/gstack
          UPSTREAM_SHA=$(git -C upstream/gstack rev-parse HEAD)
          UPSTREAM_VERSION=$(cat upstream/gstack/VERSION 2>/dev/null || echo "unknown")

          LAST_SHA=""
          if [ -f .last-upstream-sha ]; then
            LAST_SHA=$(cat .last-upstream-sha)
          fi

          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No upstream changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
            echo "$UPSTREAM_SHA" > .last-upstream-sha
            echo "Upstream changed: $UPSTREAM_SHA (was $LAST_SHA)"
          fi

      - name: Build site (with version snapshots)
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        run: USE_UPSTREAM=1 bun run build

      - name: Commit version snapshots and SHA tracker
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-upstream-sha versions/
          if ! git diff --staged --quiet; then
            VER=$(cat upstream/gstack/VERSION 2>/dev/null || echo "?")
            git commit -m "track: upstream gstack v${VER} ($(cat .last-upstream-sha | head -c 7))"
            git push || true
          fi

      - name: Configure Pages
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        id: deployment
        uses: actions/deploy-pages@v4
